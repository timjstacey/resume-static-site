name: Render OG images

# Renders each blog post's OG snippet image at PR time and commits the PNGs to
# the PR branch, so they ride the rebase-merge into main atomically with the
# post. This replaces the old post-merge render+push in publish-linkedin.yml,
# which pushed public/og/SLUG.png straight to main and raced the version-bump
# commit (issue #199). The PR branch (claude/...) is not covered by the
# protected-branches ruleset (it targets the default branch only), so the push
# needs no ruleset bypass.
#
# The push uses an ephemeral GitHub App installation token (not the built-in
# GITHUB_TOKEN): a commit pushed with GITHUB_TOKEN cannot re-trigger workflows
# (Actions loop-guard), so ci.yml / playwright.yml would go stale on the PNG
# commit's head SHA and block a non-admin/auto merge. An App token DOES
# re-trigger the required checks, and it is per-run + scoped + expiring — no
# standing PAT (issue #201). The App needs only `contents:write` on this repo,
# no ruleset bypass. Provisioned via vars.CI_BOT_APP_ID + secrets.CI_BOT_PRIVATE_KEY.
#
# Triggers on both posts and og-snippets, so an OG-snippet edit on an existing
# post re-renders its image too (not added-only). Renders every post and commits
# only what changed, so new, edited, and snippet-changed posts are all covered
# without diff parsing. Hand-written posts (no OG snippet) still get an image via
# the pickHeroFence() fallback in the /blog/SLUG/og route.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/content/posts/**'
      - 'src/og-snippets/**'

permissions:
  contents: write

# One render per PR branch: a rapid second push (synchronize) cancels the
# in-flight run so two jobs can't race the commit+push to the same branch.
concurrency:
  group: render-og-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    # Skip fork PRs: repo secrets (CI_BOT_PRIVATE_KEY) aren't exposed to fork
    # PRs, so the token mint would fail — and a fork branch isn't pushable anyway.
    # The blog routine only ever opens same-repo claude/ branches.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # Ephemeral GitHub App installation token — re-triggers the required
      # checks on the PNG commit (GITHUB_TOKEN cannot). Expires with the job.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          # Least privilege: scope the token to exactly what the push needs,
          # independent of what the App installation is granted.
          permission-contents: write

      - uses: actions/checkout@v7
        with:
          # Check out the PR head branch (not the merge ref) so the commit lands
          # on it; the App token's credentials persist for the push back.
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build site and render OG images
        run: |
          pnpm build
          pnpm preview &
          # Wait for the preview server to bind before Playwright connects — a
          # blind sleep races a slow bind and fails the render.
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:4322/; then
              echo "Preview server up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Preview server never bound on :4322 after 30s." >&2
              exit 1
            fi
            sleep 1
          done
          # No --slug: render every post. Deterministic output means only the
          # new/edited slug's PNG actually changes; the commit step no-ops otherwise.
          node scripts/og/render.mjs

      - name: Commit changed OG images to the PR branch
        env:
          # Attribute the commit to the App's bot identity. The numeric user id
          # keeps the author matched to the App account rather than a generic bot.
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          bot_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add public/og
          if git diff --cached --quiet; then
            echo "No OG image changes. Nothing to commit."
            exit 0
          fi
          # --no-verify skips husky hooks (lint-staged, pre-push typecheck) — they
          # add nothing to a bot PNG commit. version-bump.yml paths-ignores
          # public/og/** so the merged PNG never triggers a version bump.
          git commit --no-verify -m "chore(og): render OG images"
          git push --no-verify
