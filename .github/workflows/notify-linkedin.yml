name: Notify LinkedIn of blog post

# When a blog post that was cross-posted from a LinkedIn post lands on main, tell
# the linkedin-post-generator repo to comment the live blog link on the original
# LinkedIn post. Posts without a `linkedinUrl` (hand-written) are ignored.

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history back to the previous push to find the added post.
          fetch-depth: 0

      - name: Detect newly added post
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            range="$AFTER~1..$AFTER"
          else
            range="$BEFORE..$AFTER"
          fi
          POST=$(git log --diff-filter=A --name-only --pretty=format: "$range" \
            | grep -E '^src/content/posts/.+\.md$' | head -1 || true)
          echo "post=$POST" >> "$GITHUB_OUTPUT"
          if [ -z "$POST" ]; then
            echo "No newly added post in this push. Skipping."
          else
            echo "Found post: $POST"
          fi

      - name: Read LinkedIn fields and dispatch
        if: steps.detect.outputs.post != ''
        env:
          POST: ${{ steps.detect.outputs.post }}
          LPG_DISPATCH_TOKEN: ${{ secrets.LPG_DISPATCH_TOKEN }}
        run: |
          # yq (mikefarah) is preinstalled on ubuntu-latest runners.
          URL=$(yq --front-matter=extract '.linkedinUrl // ""' "$POST")
          COMMENT=$(yq --front-matter=extract '.linkedinComment // ""' "$POST")

          if [ -z "$URL" ]; then
            echo "Post has no linkedinUrl — not a cross-post. Skipping."
            exit 0
          fi
          if [ -z "$COMMENT" ]; then
            echo "Post has linkedinUrl but no linkedinComment. Skipping." >&2
            exit 1
          fi

          SLUG=$(basename "$POST" .md)
          BLOG_URL="https://tim.sillysamoyed.com/blog/$SLUG"

          PAYLOAD=$(jq -n \
            --arg url "$URL" \
            --arg blog "$BLOG_URL" \
            --arg comment "$COMMENT" \
            --arg slug "$SLUG" \
            '{event_type: "blog-published", client_payload: {linkedin_url: $url, blog_url: $blog, comment_text: $comment, slug: $slug}}')

          curl -sf --show-error -X POST \
            https://api.github.com/repos/timjstacey/linkedin-post-generator/dispatches \
            -H "Authorization: Bearer $LPG_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$PAYLOAD"
          echo "Dispatched blog-published for $SLUG."
