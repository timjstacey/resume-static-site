name: Refresh test stats

# Test counts on /testing (src/lib/testStats.ts) only change when specs change.
# Fire on pushes to main that touch test files, regenerate, and commit back.
on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - '**/*.test.ts'
      - 'playwright.config.ts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Regenerate testStats.ts
    runs-on: ubuntu-latest

    steps:
      # Ephemeral GitHub App installation token — replaces the standing admin PAT
      # (#201). The App is a ruleset bypass actor, so its per-run, scoped token
      # can push the refreshed testStats.ts to main. Same App as render-og /
      # version-bump (vars.CI_BOT_APP_ID + secrets.CI_BOT_PRIVATE_KEY).
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh test stats
        # Reads the spec inventory (playwright --list + vitest list); no browsers needed.
        run: pnpm stats:refresh

      - name: Commit on change
        run: |
          if git diff --quiet -- src/lib/testStats.ts; then
            echo "testStats.ts unchanged. Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The commit touches only src/lib/testStats.ts, which matches neither
          # this workflow's paths filter (no self-trigger) nor version-bump's
          # (paths-ignore lists it, so no bump no-op).
          git commit -am "chore(testing): refresh test stats"
          git push
