name: Refresh CI snapshot

on:
  schedule:
    # 06:00 UTC daily — keeps src/data/ci-snapshot.json from going stale.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Regenerate ci-snapshot.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Refresh snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/refresh-ci-snapshot.mjs

      - name: Open PR on change
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(ci): refresh ci-snapshot.json'
          title: 'chore(ci): refresh ci-snapshot.json'
          body: |
            Nightly regeneration of `src/data/ci-snapshot.json` from the live
            GitHub Actions API. Keeps the footer + `/testing` CI strip honest.

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          branch: chore/refresh-ci-snapshot
          delete-branch: true
