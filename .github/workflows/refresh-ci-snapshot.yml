name: Refresh CI snapshot

on:
  schedule:
    # 06:00 UTC daily — keeps src/data/ci-snapshot.json from going stale.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Regenerate ci-snapshot.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Admin PAT: pushing to main needs to bypass the branch ruleset, the
          # same way version-bump.yml + refresh-test-stats.yml do.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Refresh snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/refresh-ci-snapshot.mjs

      - name: Commit on change
        run: |
          if git diff --quiet -- src/data/ci-snapshot.json; then
            echo "ci-snapshot.json unchanged. Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # version-bump.yml paths-ignores ci-snapshot.json (bump no-op); the
          # crons are schedule/dispatch-only so this commit can't re-trigger them.
          git commit -m "chore(ci): refresh ci-snapshot.json" -- src/data/ci-snapshot.json
          git push
