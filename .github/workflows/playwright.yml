name: Playwright E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL to run tests against'
        required: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Wait for Cloudflare Pages deploy and resolve preview URL
        if: github.event_name != 'workflow_dispatch'
        id: preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: ./scripts/ci/wait-for-cf-preview.sh

      - run: pnpm exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || steps.preview.outputs.url }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
