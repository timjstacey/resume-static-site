name: Playwright E2E

on:
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL to run tests against'
        required: true

jobs:
  playwright:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.check_run.name == 'Cloudflare Pages' &&
        github.event.check_run.conclusion == 'success' &&
        github.event.check_run.pull_requests[0] != null
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Compute branch preview URL
        if: github.event_name != 'workflow_dispatch'
        id: preview
        run: |
          BRANCH="${{ github.event.check_run.pull_requests[0].head.ref }}"
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g')
          echo "url=https://${SLUG}.resume-static-site.pages.dev" >> $GITHUB_OUTPUT

      - run: pnpm exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || steps.preview.outputs.url }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
