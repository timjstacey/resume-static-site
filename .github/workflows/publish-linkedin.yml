name: Publish blog post to LinkedIn

# When a new blog post lands on main, hand the pre-written LinkedIn copy to
# linkedin-post-generator to post. The OG snippet image is rendered and committed
# at PR time by render-og.yml, so by the time this runs the PNG is already on main
# and deploying — this job writes nothing to main, it only waits and dispatches
# (issue #199 removed the post-merge render+push that raced version-bump).
#
# The blog is authored first (blog-first); the `linkedinPost` frontmatter holds
# the distilled LinkedIn summary. The copy carries no URLs — LinkedIn demotes
# posts with external links in the body, so LPG comments the dispatched blog_url
# on the post instead. Posts without `linkedinPost` (hand-written) are skipped.
# The link runs one way (LinkedIn -> blog); nothing is written back.
#
# Job flow for a new post with linkedinPost:
#   1. Detect the newly added post (or take a manual `slug` on workflow_dispatch).
#   2. Read linkedinPost; skip if absent.
#   3. Poll blog_url (200) and image_url (200 + image content-type) until live.
#   4. Dispatch to linkedin-post-generator with image_url included.
#
# workflow_dispatch with a `slug` input is the manual recovery lever: re-run it by
# hand with the slug to re-drive poll -> dispatch for one post (assumes the PNG is
# already on main — the lost-push-race failure it used to recover from is gone).

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug to (re)publish, e.g. k6-checks-vs-thresholds'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Read-only default token: this job commits nothing to main. Full
          # history is needed to diff the push range for the added-post detection.
          fetch-depth: 0

      - name: Detect newly added post
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          MANUAL_SLUG: ${{ inputs.slug }}
        run: |
          # Manual recovery: workflow_dispatch supplies the slug directly, so skip
          # the git-diff detection and point straight at that post.
          if [ -n "$MANUAL_SLUG" ]; then
            POST="src/content/posts/${MANUAL_SLUG}.md"
            if [ ! -f "$POST" ]; then
              echo "Manual slug '$MANUAL_SLUG' has no post at $POST." >&2
              exit 1
            fi
            echo "post=$POST" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch for: $POST"
            exit 0
          fi
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            range="$AFTER~1..$AFTER"
          else
            range="$BEFORE..$AFTER"
          fi
          POST=$(git log --diff-filter=A --name-only --pretty=format: "$range" \
            | grep -E '^src/content/posts/.+\.md$' | head -1 || true)
          echo "post=$POST" >> "$GITHUB_OUTPUT"
          if [ -z "$POST" ]; then
            echo "No newly added post in this push. Skipping."
          else
            echo "Found post: $POST"
          fi

      - name: Read linkedinPost
        id: read
        if: steps.detect.outputs.post != ''
        env:
          POST: ${{ steps.detect.outputs.post }}
        run: |
          # yq (mikefarah) is preinstalled on ubuntu-latest runners.
          LINKEDIN_TEXT=$(yq --front-matter=extract '.linkedinPost // ""' "$POST")
          SLUG=$(basename "$POST" .md)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          if [ -z "$LINKEDIN_TEXT" ]; then
            echo "Post has no linkedinPost — hand-written, not for LinkedIn. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          # Multi-line output via heredoc delimiter.
          echo "linkedin_text<<_EOF_LI" >> "$GITHUB_OUTPUT"
          echo "$LINKEDIN_TEXT" >> "$GITHUB_OUTPUT"
          echo "_EOF_LI" >> "$GITHUB_OUTPUT"

      - name: Poll blog URL and image URL then dispatch
        if: steps.detect.outputs.post != '' && steps.read.outputs.skip == 'false'
        env:
          SLUG: ${{ steps.read.outputs.slug }}
          LINKEDIN_TEXT: ${{ steps.read.outputs.linkedin_text }}
          LPG_DISPATCH_TOKEN: ${{ secrets.LPG_DISPATCH_TOKEN }}
        run: |
          BLOG_URL="https://tim.sillysamoyed.com/blog/${SLUG}"
          IMAGE_URL="https://tim.sillysamoyed.com/og/${SLUG}.png"

          # Wait for Cloudflare Pages to finish deploying both the post and the OG
          # image. The PNG rode this post's merge commit (render-og.yml committed
          # it to the PR branch), so both deploy from the same push — poll both
          # URLs and dispatch only when both are live. 20 retries (~10 min) covers
          # CF build + deploy lag.
          # -L follows the trailing-slash 308 (Astro directory output) so a live
          # post reads as 200, not the redirect code — otherwise the loop never
          # matches and exits 1 without dispatching.
          # The image gate checks content-type is image/*, not a bare 200: before
          # the PNG deploys, the CDN answers /og/SLUG.png with the SPA fallback —
          # HTTP 200 text/html — so a status-only check would pass on a page that
          # isn't the image and hand LinkedIn a broken preview.
          for i in $(seq 1 20); do
            blog_code=$(curl -sLL -o /dev/null -w '%{http_code}' "$BLOG_URL" || true)
            img_type=$(curl -sL -o /dev/null -w '%{content_type}' "$IMAGE_URL" || true)
            if [ "$blog_code" = "200" ] && [[ "$img_type" == image/* ]]; then
              echo "Both URLs live (blog=$blog_code, image type=$img_type)."
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "URLs not live after ~10 minutes (blog=$blog_code, image type=$img_type) — not dispatching." >&2
              exit 1
            fi
            echo "Attempt $i: blog=$blog_code image-type=$img_type. Waiting 30s..."
            sleep 30
          done

          PAYLOAD=$(jq -n \
            --arg text "$LINKEDIN_TEXT" \
            --arg blog "$BLOG_URL" \
            --arg slug "$SLUG" \
            --arg image "$IMAGE_URL" \
            '{event_type: "linkedin-publish", client_payload: {linkedin_text: $text, blog_url: $blog, slug: $slug, image_url: $image}}')

          curl -sf --show-error -X POST \
            https://api.github.com/repos/timjstacey/linkedin-post-generator/dispatches \
            -H "Authorization: Bearer $LPG_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$PAYLOAD"
          echo "Dispatched linkedin-publish for ${SLUG} with image_url."
