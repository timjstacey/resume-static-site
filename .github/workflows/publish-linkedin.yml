name: Publish blog post to LinkedIn

# When a new blog post lands on main, render its OG snippet image, commit it,
# and hand the pre-written LinkedIn copy to linkedin-post-generator to post.
# The blog is authored first (blog-first); the `linkedinPost` frontmatter holds
# the distilled LinkedIn summary. The copy carries no URLs — LinkedIn demotes
# posts with external links in the body, so LPG comments the dispatched blog_url
# on the post instead. Posts without `linkedinPost` (hand-written) are skipped.
# The link runs one way (LinkedIn -> blog); nothing is written back.
#
# Job flow for a new post with linkedinPost:
#   1. Detect the newly added post (or take a manual `slug` on workflow_dispatch).
#   2. Read linkedinPost; skip if absent.
#   3. Build the site and start pnpm preview.
#   4. Render the OG snippet image (scripts/og/render.mjs --slug SLUG).
#   5. Commit public/og/SLUG.png to main via VERSION_BUMP_TOKEN (rebase-retry on
#      a concurrent push to main; hooks skipped on the bot commit/push).
#   6. Poll blog_url (200) and image_url (200 + image content-type) until live.
#   7. Dispatch to linkedin-post-generator with image_url included.
#
# workflow_dispatch with a `slug` input is the manual recovery lever: if the push
# run failed (e.g. lost a push race and never committed the PNG), re-run it by
# hand with the slug to drive the same render -> commit -> poll -> dispatch path.

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug to (re)publish, e.g. k6-checks-vs-thresholds'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Admin PAT: needed to push public/og/SLUG.png directly to main
          # (branch ruleset bypass), same pattern as the refresh workflows.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Detect newly added post
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          MANUAL_SLUG: ${{ inputs.slug }}
        run: |
          # Manual recovery: workflow_dispatch supplies the slug directly, so skip
          # the git-diff detection and point straight at that post.
          if [ -n "$MANUAL_SLUG" ]; then
            POST="src/content/posts/${MANUAL_SLUG}.md"
            if [ ! -f "$POST" ]; then
              echo "Manual slug '$MANUAL_SLUG' has no post at $POST." >&2
              exit 1
            fi
            echo "post=$POST" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch for: $POST"
            exit 0
          fi
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            range="$AFTER~1..$AFTER"
          else
            range="$BEFORE..$AFTER"
          fi
          POST=$(git log --diff-filter=A --name-only --pretty=format: "$range" \
            | grep -E '^src/content/posts/.+\.md$' | head -1 || true)
          echo "post=$POST" >> "$GITHUB_OUTPUT"
          if [ -z "$POST" ]; then
            echo "No newly added post in this push. Skipping."
          else
            echo "Found post: $POST"
          fi

      - name: Read linkedinPost
        id: read
        if: steps.detect.outputs.post != ''
        env:
          POST: ${{ steps.detect.outputs.post }}
        run: |
          # yq (mikefarah) is preinstalled on ubuntu-latest runners.
          LINKEDIN_TEXT=$(yq --front-matter=extract '.linkedinPost // ""' "$POST")
          SLUG=$(basename "$POST" .md)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          if [ -z "$LINKEDIN_TEXT" ]; then
            echo "Post has no linkedinPost — hand-written, not for LinkedIn. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          # Multi-line output via heredoc delimiter.
          echo "linkedin_text<<_EOF_LI" >> "$GITHUB_OUTPUT"
          echo "$LINKEDIN_TEXT" >> "$GITHUB_OUTPUT"
          echo "_EOF_LI" >> "$GITHUB_OUTPUT"

      - name: Build site and render OG image
        if: steps.detect.outputs.post != '' && steps.read.outputs.skip == 'false'
        env:
          SLUG: ${{ steps.read.outputs.slug }}
        run: |
          pnpm build
          pnpm preview &
          # Wait for the preview server to actually bind before Playwright
          # connects — a blind sleep races a slow bind and fails the render
          # (and so the whole publish) with a confusing connection error.
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:4322/; then
              echo "Preview server up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Preview server never bound on :4322 after 30s." >&2
              exit 1
            fi
            sleep 1
          done
          node scripts/og/render.mjs --slug "$SLUG"

      - name: Commit OG image to main
        if: steps.detect.outputs.post != '' && steps.read.outputs.skip == 'false'
        env:
          SLUG: ${{ steps.read.outputs.slug }}
        run: |
          PNG="public/og/${SLUG}.png"
          if [ ! -f "$PNG" ]; then
            echo "OG image not found at $PNG — render step may have failed." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PNG"
          if git diff --cached --quiet; then
            echo "OG image unchanged. Nothing to commit."
            exit 0
          fi
          # --no-verify on both commit and push: skip the husky hooks (pre-commit
          # lint-staged, pre-push typecheck). They add nothing on a bot PNG commit,
          # and the pre-push typecheck ran *inside* this step — its ~8s widened the
          # window for a concurrent push (version-bump, nightly refreshes) to land
          # on main and reject ours as non-fast-forward.
          # version-bump.yml paths-ignores public/og/** so this commit never
          # triggers a version bump.
          git commit --no-verify -m "chore(og): render OG image for ${SLUG}"
          # Concurrent pushes to main race this one. On a non-fast-forward reject,
          # rebase our single PNG commit onto the latest main and retry rather than
          # failing the whole publish (which strands the post with no image and no
          # LinkedIn dispatch — recoverable only via workflow_dispatch).
          for attempt in $(seq 1 5); do
            if git push --no-verify; then
              echo "Pushed OG image."
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Push still rejected after 5 rebase attempts." >&2
              exit 1
            fi
            echo "Push rejected (attempt $attempt). Rebasing on origin/main..."
            git pull --rebase origin main
          done

      - name: Poll blog URL and image URL then dispatch
        if: steps.detect.outputs.post != '' && steps.read.outputs.skip == 'false'
        env:
          SLUG: ${{ steps.read.outputs.slug }}
          LINKEDIN_TEXT: ${{ steps.read.outputs.linkedin_text }}
          LPG_DISPATCH_TOKEN: ${{ secrets.LPG_DISPATCH_TOKEN }}
        run: |
          BLOG_URL="https://tim.sillysamoyed.com/blog/${SLUG}"
          IMAGE_URL="https://tim.sillysamoyed.com/og/${SLUG}.png"

          # Wait for Cloudflare Pages to finish deploying both the post and the OG
          # image (the PNG commit triggers a separate CF deploy). Poll both URLs —
          # dispatch only when both are live. Raised to 20 retries (~10 min) to
          # cover build + PNG commit + CF re-deploy lag.
          # -L follows the trailing-slash 308 (Astro directory output) so a live
          # post reads as 200, not the redirect code — otherwise the loop never
          # matches and exits 1 without dispatching.
          # The image gate checks content-type is image/*, not a bare 200: before
          # the PNG deploys, the CDN answers /og/SLUG.png with the SPA fallback —
          # HTTP 200 text/html — so a status-only check would pass on a page that
          # isn't the image and hand LinkedIn a broken preview.
          for i in $(seq 1 20); do
            blog_code=$(curl -sLL -o /dev/null -w '%{http_code}' "$BLOG_URL" || true)
            img_type=$(curl -sL -o /dev/null -w '%{content_type}' "$IMAGE_URL" || true)
            if [ "$blog_code" = "200" ] && [[ "$img_type" == image/* ]]; then
              echo "Both URLs live (blog=$blog_code, image type=$img_type)."
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "URLs not live after ~10 minutes (blog=$blog_code, image type=$img_type) — not dispatching." >&2
              exit 1
            fi
            echo "Attempt $i: blog=$blog_code image-type=$img_type. Waiting 30s..."
            sleep 30
          done

          PAYLOAD=$(jq -n \
            --arg text "$LINKEDIN_TEXT" \
            --arg blog "$BLOG_URL" \
            --arg slug "$SLUG" \
            --arg image "$IMAGE_URL" \
            '{event_type: "linkedin-publish", client_payload: {linkedin_text: $text, blog_url: $blog, slug: $slug, image_url: $image}}')

          curl -sf --show-error -X POST \
            https://api.github.com/repos/timjstacey/linkedin-post-generator/dispatches \
            -H "Authorization: Bearer $LPG_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$PAYLOAD"
          echo "Dispatched linkedin-publish for ${SLUG} with image_url."
