name: Refresh project stats

on:
  schedule:
    # 06:15 UTC daily — keeps src/data/project-stats.json from going stale.
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Regenerate project-stats.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Admin PAT: pushing to main needs to bypass the branch ruleset, the
          # same way version-bump.yml + refresh-test-stats.yml do.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Refresh project stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/refresh-project-stats.mjs

      - name: Commit on change
        run: |
          if git diff --quiet -- src/data/project-stats.json; then
            echo "project-stats.json unchanged. Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # version-bump.yml paths-ignores project-stats.json (bump no-op); the
          # crons are schedule/dispatch-only so this commit can't re-trigger them.
          git commit -m "chore(projects): refresh project-stats.json" -- src/data/project-stats.json
          git push
