# Static testing-page config: Playwright project routing + CI gate pipelines.
# Keep in sync with playwright.config.ts and .github/workflows/.
routing:
  - project: content
    device: Desktop Chrome
    engine: chromium
    specs: [home, jobs, projects, resume, a11y]
  - project: a11y-chromium
    device: Desktop Chrome
    engine: chromium
    specs: [nav, theme-picker]
  - project: a11y-firefox
    device: Desktop Firefox
    engine: firefox
    specs: [nav, theme-picker]
  - project: a11y-webkit
    device: Desktop Safari
    engine: webkit
    specs: [nav, theme-picker]
  - project: responsive-mobile-chrome
    device: Pixel 5
    engine: chromium
    specs: [responsive]
  - project: responsive-mobile-safari
    device: iPhone 13
    engine: webkit
    specs: [responsive]
  - project: responsive-tablet-safari
    device: iPad Pro 11
    engine: webkit
    specs: [responsive]

workflows:
  # `match` = the GitHub Actions step name; real durations are merged in from
  # ci-snapshot.json `gates` (refreshed nightly by `pnpm ci:refresh`). Keep
  # `match` in sync with the step names in .github/workflows/*.yml.
  - file: ci.yml
    accent: sapphire
    on: push · pull_request
    steps:
      - { name: check-claude-md, match: CLAUDE.md sync check }
      - { name: pnpm lint, match: Lint }
      - { name: pnpm test, match: Test (with coverage gate) }
      - { name: pnpm typecheck, match: Typecheck }
      - { name: pnpm build, match: Build }
  - file: playwright.yml
    accent: peach
    on: after preview deploy
    steps:
      - { name: wait-for-preview, match: Wait for Cloudflare Pages deploy and resolve preview URL }
      - { name: run E2E vs preview URL, match: Run pnpm exec playwright test }
