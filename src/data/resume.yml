name: Tim Stacey
tagline: 'Software Developer in Test: automation frameworks and engineering standards'
bio: >-
  I spent over three years at Sony Interactive Entertainment building E2E automation across web, API,
  and mobile, and wrapped up there in June 2026. I'm looking for my next role: remote worldwide, perm
  or contract. I push validation into the API and contract layer rather than fight flaky UI flows, and
  I set the engineering bar (strict typing, linting, hooks, tight PR practice) that takes a release
  cycle from days to hours.
contact:
